<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>INTERNAL SYSTEM - VIDEO</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        video { width: 100%; max-height: 100vh; border: 1px solid #333; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .lock-box { border: 2px solid #e74c3c; padding: 30px; text-align: center; background: #111; }
        input { padding: 12px; margin: 15px 0; width: 250px; text-align: center; border-radius: 5px; border: 1px solid #444; background: #000; color: #0f0; }
        button { padding: 10px 20px; background: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Pastikan file videonya namanya 'video_lu.mp4' atau ganti di bawah -->
    <video id="v" src="video_lu.mp4" controls controlsList="nodownload"></video>

    <div id="overlay">
        <div class="lock-box">
            <h2 style="color:red">SISTEM TERKUNCI</h2>
            <p>Konfirmasi Identitas (Password Acak)</p>
            <input type="text" id="repass" placeholder="Ketik Sandi..." autocomplete="off">
            <br>
            <button id="unlockBtn">UNLOCK SYSTEM</button>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('access');
    const vid = document.getElementById('v');
    const overlay = document.getElementById('overlay');
    const passwords = ["mbappe", "busquets", "greenwood", "ferdinand", "el knee slide", "espana"];[cite1]
    let currentPass = "";

    // 1. CEK OTORISASI (PENTING!)
    if (!mode) {
        window.location.href = "login.html"; // Tendang kalau masuk ilegal
    }

    // 2. LOGIKA LIMIT 10 DETIK
    if (mode === "restricted_mode") {
        setInterval(() => {
            if (!vid.paused) {
                lock();
            }
        }, 10000); // 10 Detik pas
    }

    function lock() {
        vid.pause();
        currentPass = passwords[Math.floor(Math.random() * passwords.length)];
        overlay.style.display = "flex";
        document.getElementById('repass').value = "";
        document.getElementById('repass').focus();
        console.log("Password sekarang: " + currentPass); 
    }

    function unlock() {
        const input = document.getElementById('repass').value.trim().toLowerCase();
        if (input === currentPass) {
            overlay.style.display = "none";
            vid.play();
        } else {
            alert("Salah! Akses ditolak.");
        }
    }

    document.getElementById('unlockBtn').addEventListener('click', unlock);
    document.getElementById('repass').addEventListener('keypress', (e) => { if (e.key === 'Enter') unlock(); });

    // Gimmick Anti-Screenshot / Perekam
    window.addEventListener('blur', () => { document.body.style.display = 'none'; });
    window.addEventListener('focus', () => { document.body.style.display = 'block'; });
</script>

</body>
</html>
