<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>DYNAMIC SECURITY CHECK</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #ff0000; padding: 40px; background: #111; text-align: center; box-shadow: 0 0 20px #ff0000; width: 350px; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; color: #0f0; border: 1px solid #444; text-align: center; font-size: 18px; outline: none; box-sizing: border-box; }
        button { width: 100%; background: #ff0000; color: #fff; border: none; padding: 15px; cursor: pointer; font-weight: bold; }
        #hint { color: #555; font-size: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>SECURITY CHECK</h1>
    <p style="color: #888;">Password Acak!</p>
    <input type="password" id="mainPass" placeholder="Masukkan Password!" autocomplete="off">
    <button id="authBtn">AUTHORIZE</button>
    <div id="hint">Sistem Terenkripsi</div>
</div>

<script>
    // Daftar sandi sesuai permintaan lu
    const listUser = ["mbappe", "busquets", "greenwood", "ferdinand", "el knee slide", "espana", "admin1234", "bypass", "nero", "req", "videoterlarang"];
    const master = "master-boot";

    // MEMILIH PASSWORD ACAK SAAT REFRESH
    // Password yang benar hanya SATU dari list ini (ditambah password master lu)
    const randomTarget = listUser[Math.floor(Math.random() * listUser.length)];

    // Bocoran buat lu di Console (F12) biar nggak pusing nebak
    console.log("=== CHEAT MODE BOS NANDO ===");
    console.log("Password aktif saat ini: " + randomTarget);
    console.log("Password admin: " + master);

    function login() {
        const input = document.getElementById('mainPass').value.trim().toLowerCase();
        
        if (input === master) {
            // Master tetap bisa masuk kapan saja
            window.location.href = "index1.html?access=full_control";
        } else if (input === randomTarget) {
            // Hanya password yang terpilih secara acak yang bisa masuk
            window.location.href = "index1.html?access=restricted_mode";
        } else {
            alert("Muka anda direkam, anda adalah penyusup!");[cite1]
            // Refresh otomatis biar password ganti lagi kalau salah (biar makin susah)
            location.reload(); 
        }
    }

    document.getElementById('authBtn').addEventListener('click', login);
    document.getElementById('mainPass').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
</script>

</body>
</html>
